services:
  caddy:
    # CaddyBuilds image bundles caddy-dns/cloudflare + WeidiDeng/caddy-cloudflare-ip
    # so `tls dns cloudflare` and `trusted_proxies cloudflare` both work without rebuild.
    # Tag tracks Caddy upstream releases: https://github.com/CaddyBuilds/caddy-cloudflare/releases
    image: ghcr.io/caddybuilds/caddy-cloudflare:2.11.2
    container_name: caddy
    restart: unless-stopped
    # mem_limit intentionally omitted: unprivileged LXC + cgroup v2 lacks the
    # cgroup delegation Docker needs to write memory.max. The LXC's own RAM
    # cap is the effective ceiling.
    ports:
      - "80:80"
      - "443:443"
    env_file:
      - .env
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./snippets:/etc/caddy/snippets:ro
      - ./sites:/etc/caddy/sites:ro
      - ./data:/data
      - ./config:/config
    # Cap stdout/stderr so /var/lib/docker/containers doesn't grow unbounded.
    # Per-site access logs already roll via the LOGGING snippet; this covers
    # Caddy's own runtime output captured by the Docker daemon.
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    # Probe Caddy's admin API (bound to localhost inside the container by default).
    # Hitting :80 would return 4xx for an unmatched Host and falsely flag unhealthy.
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:2019/config/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
